description: >-
  Asbury Automotive Group is one of the largest automotive retailers in the
  United States, operating new and used vehicle dealerships across multiple
  states and brands. Headquartered in Duluth, Georgia, Asbury operates
  approximately 200 dealerships representing 30+ automotive brands including
  luxury and non-luxury vehicles. The company operates under multiple brand
  names including Coggin Automotive Group, Crown Automotive Group, Park Place
  Dealerships, Nalley Automotive Group, and others. Asbury does not expose
  a public developer API but operates digital retail platforms including
  Clicklane, their proprietary online vehicle purchase platform.
apis:
  - aid: asbury-automotive:clicklane-platform
    name: Asbury Automotive Clicklane Platform
    description: >-
      Clicklane is Asbury Automotive's proprietary online vehicle purchase
      platform that enables customers to complete the full car buying process
      digitally, including vehicle selection, financing, trade-in valuation,
      F&I products, and final purchase without visiting a dealership.
    humanURL: https://www.clicklane.com/
    baseURL: https://www.clicklane.com
