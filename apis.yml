common:
  - type: Portal
    url: https://www.asburyauto.com/
    title: Asbury Automotive Group Website
  - type: Features
    data:
      - name: Clicklane Digital Retail
        description: >-
          Proprietary online vehicle purchase platform allowing customers to
          complete the entire car buying process digitally including financing,
          trade-ins, and F&I products.
      - name: Multi-Brand Dealership Network
        description: >-
          Operates approximately 200 dealerships across 30+ automotive brands
          including luxury brands (Lexus, Mercedes, BMW, Audi) and non-luxury
          (Toyota, Honda, Ford, Chevrolet).
      - name: Digital Service Scheduling
        description: >-
          Online service appointment scheduling across all Asbury dealership
          brands through brand-specific and aggregated scheduling tools.
  - type: UseCases
    data:
      - name: Digital Vehicle Purchase
        description: >-
          Customers use Clicklane to research, finance, and purchase vehicles
          entirely online without visiting a dealership.
      - name: Trade-In Valuation
        description: >-
          Vehicle owners use Asbury's digital tools to obtain trade-in
          valuations for their current vehicles as part of new vehicle purchase.
      - name: Service and Parts
        description: >-
          Vehicle owners schedule service appointments and order parts through
          Asbury's dealership service departments.
  - type: Integrations
    data:
      - name: OEM Dealer Management Systems
        description: >-
          Asbury integrates with manufacturer dealer management systems and
          DMS platforms like CDK Global and Reynolds & Reynolds.
      - name: Finance and Insurance Partners
        description: >-
          Integration with lenders and F&I product providers through Asbury's
          F&I technology platform across all dealership locations.
